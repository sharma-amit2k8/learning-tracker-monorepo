<div class="flex flex-col justify-center
items-center gap-2 p-3">
    <h2 class="text-2xl font-bold">Delete Course</h2>

    <div>
        Are you sure you want to delete <strong>{{ data.title }}</strong> ?
    </div>

    <div class="gap-2">
        <button mat-button (click)="cancel()" class="font-bold p-2 m-2">
            Cancel
        </button>

        <button mat-raised-button class="font-bold p-2 m-2" color="warn" (click)="confirmDelete()">
            Delete
        </button>
    </div>
</div>
