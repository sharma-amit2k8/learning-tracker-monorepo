    <!-- HEADER -->
<div>
    <div class="bg-zinc-900 text-white rounded-2xl p-6 animate-fadeIn">    
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold">
        Edit Course
      </h2>
      <button
        (click)="onClose()"
        class="text-zinc-400 hover:text-white text-xl">
        ✕
      </button>
    </div>
    <!-- BODY -->
    <div>
      <div class="flex">
                <form [formGroup]="editCourseForm" (submit)="onSubmit()" class="w-full">
                    <div class="flex">
                        <label class="font-bold p-2 text-zinc-400" for="title">Title</label>
                        <input class="border-2 border-zinc-700 rounded-xl p-3 m-2" formControlName="title"/>
                    </div>
                    <div>
                        @if(editCourseForm.get('title')?.hasError('required') && editCourseForm.get('title')?.touched){
                            <p class="text-red-400 font-bold pl-24">Title is mandatory</p>
                        }
                    </div>
                    <div class="flex">
                        <label class="font-bold p-2 text-zinc-400" for="desc">Description</label>
                        <textarea class="border-2 border-zinc-700 rounded-xl p-3 m-2" formControlName="desc"></textarea>
                    </div>
                    <!-- <div class="flex">
                        <label class="font-bold p-2 text-zinc-400" for="title">Price</label>
                        <input type="number" class="border-2 border-zinc-700 rounded-xl p-3 m-2" formControlName="price"/>
                    </div> -->
                    <div class="flex">
                        <label class="font-bold p-2 text-zinc-400" for="status">Status</label>
                        <select class="w-49 border-2 border-zinc-700 rounded-xl p-3 m-2  appearance-none" formControlName="status">
                            <option value="">Select status</option>
                            <option value="not started">Not Started</option>
                            <option value="in progress">In Progress</option>
                            <option value="completed">Completed</option>
                         </select>
                    </div>
                    <div class="flex">
                        <label class="font-bold p-2 text-zinc-400" for="title">Total Lessons</label>
                        <input type="number" class="border-2 border-zinc-700 rounded-xl p-3 m-2" formControlName="totalLessons"/>
                    </div>
                    <div class="flex">
                        <label class="font-bold p-2 text-zinc-400" for="title">Completed Lessons</label>
                        <input type="number" class="border-2 border-zinc-700 rounded-xl p-3 m-2" formControlName="completedLessons"/>
                    </div>
                    <div class="flex justify-center" >
                        <button [disabled]="editCourseForm.invalid" type="submit" 
                        class="bg-blue-400 disabled:bg-gray-400 px-8 py-3 font-bold text-white rounded-xl" 
                        >
                            Save
                        </button>
                    </div>
                </form>
            </div>
    </div>
  </div>
</div>
